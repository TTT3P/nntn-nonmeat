<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/nntn/auth.js"></script>
<title>NNTN — Sales Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --brand-green: #005036;
  --brand-gold: #D29568;
  --green-50: #E8F5EC;
  --green-600: #16653A;
  --gold-50: #FBF4ED;
  --danger: #D72C0D;
  --danger-bg: #FFF4F4;
  --success: #008060;
  --bg: #F6F6F7;
  --surface: #FFFFFF;
  --border: #E1E3E5;
  --border-sub: #EDEEEF;
  --ink: #202223;
  --ink-sub: #6D7175;
  --ink-light: #8C9196;
  --shadow-sm: 0 1px 0 rgba(0,0,0,.04);
  --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.04);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', 'Sarabun', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-left { display:flex; align-items:center; gap:16px; }
.header-back {
  color: var(--ink-sub);
  text-decoration: none;
  font-size: 20px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  transition: background .1s;
}
.header-back:hover { background: var(--bg); }
.header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header-title span { color: var(--ink-sub); font-weight: 400; }
.header-nav { display:flex; gap:8px; }
.header-link {
  font-size: 13px; font-weight: 500;
  color: var(--brand-green);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  transition: background .1s;
}
.header-link:hover { background: var(--green-50); }

/* Container */
.container { max-width: 1000px; margin: 0 auto; padding: 20px 24px 48px; }
@media(max-width:640px) { .container { padding: 16px 12px 48px; } }

/* Filter bar */
.filter-bar {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  margin-bottom: 20px;
}
.filter-group { display:flex; align-items:center; gap:8px; }
.filter-label { font-size: 13px; color: var(--ink-sub); font-weight: 500; }
.seg-control { display:flex; border:1px solid var(--border); border-radius: var(--radius-sm); overflow:hidden; }
.seg-btn {
  padding: 7px 16px; border: none; background: var(--surface);
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--ink-sub); cursor: pointer;
  border-right: 1px solid var(--border);
  transition: all .12s;
}
.seg-btn:last-child { border-right: none; }
.seg-btn.active { background: var(--brand-green); color: #fff; }
.seg-btn:hover:not(.active) { background: var(--bg); }

.filter-select {
  padding: 7px 32px 7px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
  background: var(--surface); color: var(--ink);
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='7' viewBox='0 0 12 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%236D7175' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center;
}

/* KPI Cards */
.kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
@media(max-width:640px) { .kpi-row { grid-template-columns: repeat(2,1fr); } }
.kpi {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-card);
}
.kpi-label { font-size: 12px; color: var(--ink-sub); font-weight: 500; margin-bottom: 6px; }
.kpi-val { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
.kpi-sub { font-size: 12px; color: var(--ink-light); margin-top: 6px; display:flex; align-items:center; gap:4px; }
.kpi-up { color: var(--success); }
.kpi-danger { color: var(--danger); }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  margin-bottom: 16px;
  overflow: hidden;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-sub);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 600; display:flex; align-items:center; gap:8px; }
.card-badge { font-size: 11px; background: var(--green-50); color: var(--green-600); padding: 2px 10px; border-radius: 10px; font-weight: 600; }
.card-body { padding: 20px; }

/* Charts */
.chart-wrap { position: relative; height: 280px; }
@media(max-width:640px) { .chart-wrap { height: 220px; } }

/* Tables */
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl th {
  padding: 10px 12px; text-align: left;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em;
  color: var(--ink-sub);
  border-bottom: 1px solid var(--border);
  background: transparent;
}
.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--border-sub); }
.tbl tbody tr:hover td { background: #FAFAFA; }
.tbl .num { text-align:right; font-variant-numeric:tabular-nums; }
.rank {
  display:inline-flex; align-items:center; justify-content:center;
  width:24px; height:24px; border-radius:6px; font-size:11px; font-weight:700;
}
.rank-1 { background:#FFF3CD; color:#664D03; }
.rank-2 { background:#E9ECEF; color:#495057; }
.rank-3 { background:#FFE0CC; color:#7C4700; }
.rank-n { background:transparent; color:var(--ink-light); }

.bar-inline { display:flex; align-items:center; gap:6px; }
.bar-track { flex:1; height:6px; background:var(--border-sub); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; }
.bar-pct { font-size:11px; color:var(--ink-light); min-width:32px; text-align:right; }

/* Coverage */
.coverage-meter { display:flex; align-items:center; gap:16px; }
.coverage-bar { flex:1; height:28px; background:var(--bg); border-radius:14px; overflow:hidden; }
.coverage-fill { height:100%; border-radius:14px; transition:width .5s ease; }
.coverage-pct { font-size:32px; font-weight:700; min-width:80px; text-align:right; letter-spacing:-1px; }
.coverage-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:16px; }
.cov-stat { text-align:center; }
.cov-stat-val { font-size:20px; font-weight:700; }
.cov-stat-label { font-size:11px; color:var(--ink-sub); }

/* Grid */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:700px) { .grid-2 { grid-template-columns:1fr; } }

/* Channel legend */
.ch-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-sub); }
.ch-row:last-child { border-bottom:none; }
.ch-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.ch-name { flex:1; font-size:13px; }
.ch-val { font-size:13px; font-weight:600; }
.ch-pct { font-size:12px; color:var(--ink-light); min-width:44px; text-align:right; }

.loading { color:var(--ink-light); font-size:13px; padding:32px; text-align:center; }
.error-msg { color:var(--danger); font-size:14px; padding:20px; background:var(--danger-bg); border-radius:var(--radius-sm); margin:20px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="header-back" href="./hub.html">‹</a>
    <div class="header-title">Sales Analysis <span>· NNTN</span></div>
  </div>
  <div class="header-nav">
    <a class="header-link" href="./sales-ops.html">Sales Ops →</a>
  </div>
</div>

<div class="container">

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">ช่วง</span>
      <div class="seg-control">
        <button class="seg-btn active" data-days="7">7 วัน</button>
        <button class="seg-btn" data-days="14">14 วัน</button>
        <button class="seg-btn" data-days="30">30 วัน</button>
        <button class="seg-btn" data-days="0">ทั้งหมด</button>
      </div>
    </div>
    <div class="filter-group" style="margin-left:auto">
      <span class="filter-label">สาขา</span>
      <select class="filter-select" id="branch-sel">
        <option value="all">ทุกสาขา</option>
        <option value="NT-KITCHEN">ร้านข้าว</option>
        <option value="NT-NOODLE">ร้านก๋วยเตี๋ยว</option>
      </select>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">รายได้รวม</div>
      <div class="kpi-val" id="kpi-revenue">—</div>
      <div class="kpi-sub" id="kpi-revenue-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">จำนวนบิล</div>
      <div class="kpi-val" id="kpi-bills">—</div>
      <div class="kpi-sub" id="kpi-bills-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">เฉลี่ย / บิล</div>
      <div class="kpi-val" id="kpi-avg">—</div>
      <div class="kpi-sub" id="kpi-avg-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">เมนูขาย</div>
      <div class="kpi-val" id="kpi-menus">—</div>
      <div class="kpi-sub" id="kpi-menus-sub"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">รายได้รายวัน <span class="card-badge" id="trend-badge">7 วัน</span></div>
    </div>
    <div class="card-body">
      <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-header"><div class="card-title">ช่องทางขาย</div></div>
      <div class="card-body">
        <div style="height:200px;position:relative"><canvas id="chart-channel"></canvas></div>
        <div id="channel-legend" style="margin-top:12px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Menu Mapping</div></div>
      <div class="card-body" id="coverage-box"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">เมนูขายดี — จำนวน</div>
      <span style="font-size:12px;color:var(--ink-light)">Top 20 (ไม่รวม modifier)</span>
    </div>
    <div class="card-body" style="padding:0" id="top-menu-table"><div class="loading">กำลังโหลด...</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">เมนูรายได้สูงสุด</div>
      <span style="font-size:12px;color:var(--ink-light)">Top 20 (ไม่รวม modifier)</span>
    </div>
    <div class="card-body" style="padding:0" id="top-revenue-table"><div class="loading">กำลังโหลด...</div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const BRANCH_LABEL = { 'NT-KITCHEN': 'ร้านข้าว', 'NT-NOODLE': 'ร้านก๋วยเตี๋ยว' };

const sb = (window.NNTN_SB_URL && window.NNTN_SB_ANON)
  ? supabase.createClient(window.NNTN_SB_URL, window.NNTN_SB_ANON, {
      db: { schema: 'sales_ops' },
      global: { headers: {
        'Accept-Profile': 'sales_ops',
        'Content-Profile': 'sales_ops',
        'Authorization': 'Bearer ' + (window.__nntnCurrentToken || localStorage.getItem('nntn_sb_token') || window.NNTN_SB_ANON)
      }}
    })
  : null;

const esc = s => (s ?? '—').toString().replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const fmt = n => new Intl.NumberFormat('th-TH').format(Math.round(+n || 0));
const fmtB = n => '฿' + fmt(n);
const isModifier = r => +r.unit_price === 0;

let allFs = [];
let allDaily = [];
let allAliases = [];
let currentDays = 7;
let currentBranch = 'all';
let trendChart = null;
let channelChart = null;

function dateStr(d) { return d.toISOString().split('T')[0]; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }

async function loadData() {
  if (!sb) { document.querySelector('.container').innerHTML = '<div class="error-msg">Supabase ไม่พร้อม — กรุณา login ก่อน</div>'; return; }

  const [fsRes, dailyRes, aliasRes] = await Promise.all([
    sb.from('fs_items').select('sale_date,branch_id,menu_name,qty,unit_price,discounted_price,channel_name,receipt_no').order('sale_date', { ascending: true }),
    sb.from('v_daily_revenue').select('*').order('sale_date', { ascending: true }),
    sb.from('menu_aliases').select('menu_name,rcp_code,is_active').eq('is_active', true)
  ]);

  if (fsRes.error) { document.querySelector('.container').innerHTML = `<div class="error-msg">โหลดข้อมูลไม่ได้: ${fsRes.error.message}</div>`; return; }

  allFs = fsRes.data || [];
  allDaily = dailyRes.data || [];
  allAliases = aliasRes.data || [];
  render();
}

function getDateRange() {
  if (!allFs.length) return { start: '', end: '' };
  const maxDate = allFs[allFs.length - 1].sale_date;
  if (currentDays === 0) return { start: allFs[0].sale_date, end: maxDate };
  const end = new Date(maxDate);
  const start = addDays(end, -(currentDays - 1));
  return { start: dateStr(start), end: maxDate };
}

function filterFs() {
  const { start, end } = getDateRange();
  return allFs.filter(r => r.sale_date >= start && r.sale_date <= end && (currentBranch === 'all' || r.branch_id === currentBranch));
}

function filterDaily() {
  const { start, end } = getDateRange();
  return allDaily.filter(r => r.sale_date >= start && r.sale_date <= end && (currentBranch === 'all' || r.branch_id === currentBranch));
}

function render() {
  const rows = filterFs();
  const daily = filterDaily();
  const realRows = rows.filter(r => !isModifier(r));
  renderKPIs(realRows);
  renderTrend(daily);
  renderChannel(realRows);
  renderCoverage(realRows);
  renderTopMenuQty(realRows);
  renderTopMenuRevenue(realRows);
  document.getElementById('trend-badge').textContent = currentDays === 0 ? 'ทั้งหมด' : currentDays + ' วัน';
}

function renderKPIs(rows) {
  const revenue = rows.reduce((s, r) => s + (+r.discounted_price || 0), 0);
  const bills = new Set(rows.map(r => r.receipt_no)).size;
  const avg = bills > 0 ? revenue / bills : 0;
  const menus = new Set(rows.map(r => r.menu_name)).size;
  const days = new Set(rows.map(r => r.sale_date)).size;

  document.getElementById('kpi-revenue').textContent = fmtB(revenue);
  document.getElementById('kpi-revenue-sub').textContent = days + ' วัน';
  document.getElementById('kpi-bills').textContent = fmt(bills);
  document.getElementById('kpi-bills-sub').textContent = '~' + fmt(Math.round(bills / (days || 1))) + ' บิล/วัน';
  document.getElementById('kpi-avg').textContent = fmtB(avg);
  document.getElementById('kpi-avg-sub').textContent = 'ต่อบิล';
  document.getElementById('kpi-menus').textContent = fmt(menus);
  document.getElementById('kpi-menus-sub').textContent = 'เมนูไม่ซ้ำ';
}

function renderTrend(daily) {
  const grouped = {};
  daily.forEach(r => {
    if (!grouped[r.sale_date]) grouped[r.sale_date] = { fs: 0, grab: 0 };
    grouped[r.sale_date].fs += +r.fs_revenue || 0;
    grouped[r.sale_date].grab += +r.grab_revenue || 0;
  });

  const dates = Object.keys(grouped).sort();
  const labels = dates.map(d => { const p = d.split('-'); return +p[2] + '/' + +p[1]; });

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('chart-trend'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'FoodStory (หน้าร้าน+LINE MAN)', data: dates.map(d => grouped[d].fs), backgroundColor: 'rgba(210,149,104,.85)', borderRadius: 4, borderSkipped: false },
        { label: 'Grab', data: dates.map(d => grouped[d].grab), backgroundColor: 'rgba(0,80,54,.85)', borderRadius: 4, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { font: { family: 'Inter, Sarabun', size: 12 }, padding: 16, usePointStyle: true, pointStyle: 'rectRounded' } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtB(ctx.raw) } }
      },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { stacked: true, grid: { color: '#F1F1F1' }, border: { display: false }, ticks: { font: { size: 11 }, callback: v => v >= 1000 ? (v/1000).toFixed(0) + 'k' : v } }
      }
    }
  });
}

function renderChannel(rows) {
  const ch = {};
  rows.forEach(r => {
    const name = r.channel_name || 'อื่นๆ';
    if (!ch[name]) ch[name] = { revenue: 0, orders: new Set() };
    ch[name].revenue += +r.discounted_price || 0;
    ch[name].orders.add(r.receipt_no);
  });

  const entries = Object.entries(ch).sort((a, b) => b[1].revenue - a[1].revenue);
  const labels = entries.map(e => e[0]);
  const data = entries.map(e => e[1].revenue);
  const colors = ['#005036', '#D29568', '#37474F', '#5C6BC0', '#8A8A7F'];
  const total = data.reduce((s, v) => s + v, 0);

  if (channelChart) channelChart.destroy();
  channelChart = new Chart(document.getElementById('chart-channel'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 3, borderColor: '#fff', hoverOffset: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtB(ctx.raw) + ' (' + (ctx.raw / total * 100).toFixed(1) + '%)' } }
      }
    }
  });

  document.getElementById('channel-legend').innerHTML = entries.map((e, i) =>
    `<div class="ch-row">
      <span class="ch-dot" style="background:${colors[i]}"></span>
      <span class="ch-name">${esc(e[0])}</span>
      <span class="ch-val">${fmtB(e[1].revenue)}</span>
      <span class="ch-pct">${total > 0 ? (e[1].revenue / total * 100).toFixed(1) + '%' : '—'}</span>
    </div>`
  ).join('');
}

function renderCoverage(rows) {
  const uniqueMenus = new Set(rows.map(r => r.menu_name));
  const aliasSet = new Set(allAliases.map(a => a.menu_name));
  let mapped = 0;
  uniqueMenus.forEach(m => { if (aliasSet.has(m)) mapped++; });
  const total = uniqueMenus.size;
  const unmapped = total - mapped;
  const pct = total > 0 ? (mapped / total * 100) : 0;
  const color = pct >= 80 ? 'var(--success)' : pct >= 50 ? '#B98900' : 'var(--danger)';

  document.getElementById('coverage-box').innerHTML = `
    <div class="coverage-meter">
      <div class="coverage-bar"><div class="coverage-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="coverage-pct" style="color:${color}">${pct.toFixed(0)}%</div>
    </div>
    <div class="coverage-stats">
      <div class="cov-stat"><div class="cov-stat-val" style="color:var(--success)">${mapped}</div><div class="cov-stat-label">Mapped</div></div>
      <div class="cov-stat"><div class="cov-stat-val" style="color:var(--danger)">${unmapped}</div><div class="cov-stat-label">ยังไม่ map</div></div>
      <div class="cov-stat"><div class="cov-stat-val">${total}</div><div class="cov-stat-label">รวมทั้งหมด</div></div>
    </div>
    <p style="margin-top:16px;font-size:12px;color:var(--ink-light);line-height:1.6">
      Coverage ต่ำ → ไม่รู้ว่าเมนูไหน map กับสูตรไหน → กระทบ FC% variance
    </p>`;
}

function renderTopMenuQty(rows) {
  const menu = {};
  rows.forEach(r => {
    const n = r.menu_name;
    if (!menu[n]) menu[n] = { qty: 0, rev: 0 };
    menu[n].qty += +r.qty || 0;
    menu[n].rev += +r.discounted_price || 0;
  });
  const sorted = Object.entries(menu).sort((a, b) => b[1].qty - a[1].qty).slice(0, 20);
  const maxQty = sorted[0]?.[1]?.qty || 1;

  document.getElementById('top-menu-table').innerHTML = sorted.length
    ? `<table class="tbl">
      <thead><tr><th style="width:36px">#</th><th>เมนู</th><th class="num" style="width:60px">จำนวน</th><th style="width:130px"></th><th class="num" style="width:90px">รายได้</th></tr></thead>
      <tbody>${sorted.map(([name, d], i) => `<tr>
        <td><span class="rank ${i < 3 ? 'rank-'+(i+1) : 'rank-n'}">${i+1}</span></td>
        <td style="font-weight:500">${esc(name)}</td>
        <td class="num"><b>${fmt(d.qty)}</b></td>
        <td><div class="bar-inline"><div class="bar-track"><div class="bar-fill" style="width:${(d.qty/maxQty*100).toFixed(1)}%;background:var(--brand-green)"></div></div><div class="bar-pct">${(d.qty/maxQty*100).toFixed(0)}%</div></div></td>
        <td class="num" style="color:var(--ink-sub)">${fmtB(d.rev)}</td>
      </tr>`).join('')}</tbody></table>`
    : '<div class="loading">ไม่มีข้อมูล</div>';
}

function renderTopMenuRevenue(rows) {
  const menu = {};
  rows.forEach(r => {
    const n = r.menu_name;
    if (!menu[n]) menu[n] = { qty: 0, rev: 0 };
    menu[n].qty += +r.qty || 0;
    menu[n].rev += +r.discounted_price || 0;
  });
  const sorted = Object.entries(menu).sort((a, b) => b[1].rev - a[1].rev).slice(0, 20);
  const maxRev = sorted[0]?.[1]?.rev || 1;

  document.getElementById('top-revenue-table').innerHTML = sorted.length
    ? `<table class="tbl">
      <thead><tr><th style="width:36px">#</th><th>เมนู</th><th class="num" style="width:90px">รายได้</th><th style="width:130px"></th><th class="num" style="width:60px">จำนวน</th></tr></thead>
      <tbody>${sorted.map(([name, d], i) => `<tr>
        <td><span class="rank ${i < 3 ? 'rank-'+(i+1) : 'rank-n'}">${i+1}</span></td>
        <td style="font-weight:500">${esc(name)}</td>
        <td class="num"><b>${fmtB(d.rev)}</b></td>
        <td><div class="bar-inline"><div class="bar-track"><div class="bar-fill" style="width:${(d.rev/maxRev*100).toFixed(1)}%;background:var(--brand-gold)"></div></div><div class="bar-pct">${(d.rev/maxRev*100).toFixed(0)}%</div></div></td>
        <td class="num" style="color:var(--ink-sub)">${fmt(d.qty)}</td>
      </tr>`).join('')}</tbody></table>`
    : '<div class="loading">ไม่มีข้อมูล</div>';
}

document.querySelectorAll('.seg-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDays = +btn.dataset.days;
    render();
  });
});

document.getElementById('branch-sel').addEventListener('change', e => {
  currentBranch = e.target.value;
  render();
});

loadData();
</script>
</body>
</html>
